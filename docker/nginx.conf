# ── HTTP: redirect sang HTTPS + Let's Encrypt ACME challenge ─────────────
server {
    listen 80;
    server_name _;

    # ACME challenge cho certbot (trước khi redirect)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Nginx healthcheck — không redirect (dùng bởi Docker HEALTHCHECK)
    location /nginx-health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Redirect tất cả HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;

    # SSL Certificate (Let's Encrypt hoặc self-signed)
    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

    # SSL settings
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/html text/css text/javascript application/javascript application/json image/svg+xml;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Frontend (React SPA) ──────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;

        # Cache HTML ngắn (SPA entry point)
        location = /index.html {
            expires 1m;
            add_header Cache-Control "no-cache";
        }
    }

    # Static assets với long cache (Vite thêm hash vào tên file)
    location /assets/ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Backend API ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://tsbot-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout đủ dài cho LLM inference
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
        proxy_connect_timeout 10s;

        # Bắt buộc cho SSE streaming — tắt buffering
        proxy_buffering off;
        proxy_cache off;

        # Giới hạn request body (file upload)
        client_max_body_size 20M;
    }

    # ── WebSocket (chat streaming) ────────────────────────────────────
    location /ws/ {
        proxy_pass http://tsbot-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;  # WebSocket cần timeout dài hơn
    }

    # Health check endpoint
    location /health {
        proxy_pass http://tsbot-api:8000/health;
        proxy_read_timeout 10s;
    }
}
