server {
    listen 80;
    server_name _;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/html text/css text/javascript application/javascript application/json image/svg+xml;

    # Security headers (thêm vào HTTPS config khi có SSL)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Frontend (React SPA) ──────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;

        # Cache HTML ngắn (SPA entry point)
        location = /index.html {
            expires 1m;
            add_header Cache-Control "no-cache";
        }
    }

    # Static assets với long cache (Vite thêm hash vào tên file)
    location /assets/ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Backend API ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://tsbot-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout đủ dài cho LLM inference
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
        proxy_connect_timeout 10s;

        # Giới hạn request body (file upload)
        client_max_body_size 20M;
    }

    # ── WebSocket (chat streaming) ────────────────────────────────────
    location /ws/ {
        proxy_pass http://tsbot-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;  # WebSocket cần timeout dài hơn
    }

    # Health check endpoint (không cần proxy)
    location /health {
        proxy_pass http://tsbot-api:8000/health;
        proxy_read_timeout 10s;
    }
}
